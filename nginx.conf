# =============================================================================
# nginx config for the Shava production stack.
#
# - Terminates TLS for the public domain.
# - Redirects all HTTP traffic to HTTPS.
# - Rate-limits authentication and admin endpoints.
# - Serves Django static/media files directly from a shared volume.
# - Proxies /api/ and /admin/ to gunicorn, everything else to the SvelteKit
#   node server.
# - Sets a strict set of security headers (HSTS, CSP, no-sniff, frame-deny,
#   referrer policy, permissions policy).
#
# Mount TLS certs at /etc/nginx/certs/fullchain.pem and privkey.pem
# (e.g. via Let's Encrypt / certbot on the host).
# =============================================================================

user  nginx;
worker_processes auto;

# Pass at most a few file descriptors per worker; production tuning.
events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't leak the nginx version in error pages or the Server header.
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Limit request body size to protect against large-upload DoS.
    client_max_body_size 10m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # ----- Logging -----
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    # ----- Compression -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml
        application/x-font-ttf font/opentype application/vnd.ms-fontobject;

    # ----- Rate limiting -----
    # Per-IP zones. The application also throttles via DRF; this is defence in
    # depth at the edge.
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ----- Upstreams -----
    upstream django_backend {
        server web:8000;
        keepalive 16;
    }

    upstream sveltekit_frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ----- Reusable security headers -----
    # X-XSS-Protection is intentionally omitted — it is deprecated in modern
    # browsers and can introduce vulnerabilities.
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; img-src 'self' data: blob: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'";
    }

    # ----- HTTP -> HTTPS redirect -----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Allow ACME http-01 challenges to be served from a shared volume.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Plaintext healthcheck for container orchestration.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- HTTPS server -----
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        # server_name accepts any host; the upstream Django service still
        # enforces ALLOWED_HOSTS so spoofed Host headers are rejected.
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling (uncomment once your cert chain provider is available).
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # ----- Security headers (applied to all responses on this vhost) -----
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Content-Security-Policy $csp_header always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;

        # Connection limit per IP.
        limit_conn conn_per_ip 50;

        # ----- Common proxy settings -----
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # ----- Healthcheck -----
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ----- Auth endpoints (stricter throttling) -----
        location ~ ^/api/(token|users/(login|register|password)) {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://django_backend;
        }

        # ----- API -----
        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass http://django_backend;
        }

        # ----- Django admin -----
        # Optionally restrict by IP allowlist for additional safety.
        location /admin/ {
            limit_req zone=auth_zone burst=10 nodelay;
            proxy_pass http://django_backend;
        }

        # ----- Static files (collected by `manage.py collectstatic`) -----
        location /static/ {
            alias /static/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ----- User-uploaded media -----
        location /media/ {
            alias /media/;
            access_log off;
            expires 7d;
            add_header Cache-Control "public";
            # Force a safe content-disposition for unknown types.
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ----- SvelteKit frontend (catch-all) -----
        location / {
            proxy_pass http://sveltekit_frontend;
        }

        # Block hidden files (e.g. .git, .env) from ever being served.
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
