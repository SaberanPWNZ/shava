openapi: 3.0.3
info:
  title: Shava API
  version: 1.0.0
  description: 'Public REST API for the Shava project: places, reviews, ratings, users
    (JWT auth), articles, gamification.'
paths:
  /api/articles/:
    get:
      operationId: articles_list
      description: Articles are publicly readable (when published); admin-only for
        writes.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - articles
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticleListList'
          description: ''
    post:
      operationId: articles_create
      description: Articles are publicly readable (when published); admin-only for
        writes.
      tags:
      - articles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArticleDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArticleDetailRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
          description: ''
  /api/articles/{slug}/:
    get:
      operationId: articles_retrieve
      description: Articles are publicly readable (when published); admin-only for
        writes.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - articles
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
          description: ''
    put:
      operationId: articles_update
      description: Articles are publicly readable (when published); admin-only for
        writes.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - articles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArticleDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArticleDetailRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
          description: ''
    patch:
      operationId: articles_partial_update
      description: Articles are publicly readable (when published); admin-only for
        writes.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - articles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedArticleDetailRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedArticleDetailRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedArticleDetailRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleDetail'
          description: ''
    delete:
      operationId: articles_destroy
      description: Articles are publicly readable (when published); admin-only for
        writes.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - articles
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/gamification/badges/:
    get:
      operationId: gamification_badges_list
      description: '`GET /api/gamification/badges/` — full catalogue (public).'
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - gamification
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Badge'
          description: ''
  /api/gamification/leaderboard/:
    get:
      operationId: gamification_leaderboard_retrieve
      description: '`GET /api/gamification/leaderboard/?period=week|month|all`.'
      tags:
      - gamification
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/gamification/me/:
    get:
      operationId: gamification_me_retrieve
      description: '`GET /api/gamification/me/` — current user''s points/level/badges.'
      tags:
      - gamification
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/gamification/users/{id}/public/:
    get:
      operationId: gamification_users_public_retrieve
      description: '`GET /api/gamification/users/<id>/public/`.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - gamification
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/places/:
    get:
      operationId: places_list
      description: Public list of approved/active places, with filters.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - places
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaceList'
          description: ''
  /api/places/{id}/:
    get:
      operationId: places_retrieve
      description: Author or admin can edit a place.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - places
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceUpdate'
          description: ''
    put:
      operationId: places_update
      description: Author or admin can edit a place.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - places
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaceUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlaceUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceUpdate'
          description: ''
    patch:
      operationId: places_partial_update
      description: Author or admin can edit a place.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - places
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPlaceUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPlaceUpdateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPlaceUpdateRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceUpdate'
          description: ''
  /api/places/{id}/{action_name}/:
    patch:
      operationId: places_partial_update_2
      description: Admin endpoint to approve/reject a place. Action is taken from
        URL kwargs.
      parameters:
      - in: path
        name: action_name
        schema:
          type: string
          pattern: ^approve|reject$
        required: true
      - in: path
        name: id
        schema:
          type: string
          pattern: ^\d+$
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPlaceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPlaceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPlaceRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Place'
          description: ''
  /api/places/{id}/rate/:
    post:
      operationId: places_rate_create
      description: 'Star-rating endpoint: accepts {rating: 1..5}, stored on 0-10 scale.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceRating'
          description: ''
  /api/places/{place_pk}/menu/:
    get:
      operationId: places_menu_list
      description: 'Menu items for a specific place. URL kwarg: place_pk.'
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - places
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMenuItemList'
          description: ''
    post:
      operationId: places_menu_create
      description: 'Menu items for a specific place. URL kwarg: place_pk.'
      parameters:
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'
          description: ''
  /api/places/{place_pk}/menu/{id}/:
    get:
      operationId: places_menu_retrieve
      description: 'Menu items for a specific place. URL kwarg: place_pk.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this menu.
        required: true
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      tags:
      - places
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'
          description: ''
    put:
      operationId: places_menu_update
      description: 'Menu items for a specific place. URL kwarg: place_pk.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this menu.
        required: true
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'
          description: ''
    patch:
      operationId: places_menu_partial_update
      description: 'Menu items for a specific place. URL kwarg: place_pk.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this menu.
        required: true
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMenuItemRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMenuItemRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMenuItemRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItem'
          description: ''
    delete:
      operationId: places_menu_destroy
      description: 'Menu items for a specific place. URL kwarg: place_pk.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this menu.
        required: true
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      tags:
      - places
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/places/{place_pk}/reviews/:
    get:
      operationId: places_reviews_list
      description: List approved reviews for a place; create a new (pending) review.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - places
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewList'
          description: ''
    post:
      operationId: places_reviews_create
      description: List approved reviews for a place; create a new (pending) review.
      parameters:
      - in: path
        name: place_pk
        schema:
          type: integer
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewCreate'
          description: ''
  /api/places/create-place/:
    post:
      operationId: places_create_place_create
      description: Authenticated users submit a new place; always created on moderation.
      tags:
      - places
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaceCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlaceCreateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceCreate'
          description: ''
  /api/places/moderation/:
    get:
      operationId: places_moderation_list
      description: Admin-only list of places pending moderation.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - places
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaceList'
          description: ''
  /api/places/place/{id}/:
    get:
      operationId: places_place_retrieve
      description: Public detail view; non-public statuses only visible to author
        or staff.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - places
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceDetail'
          description: ''
  /api/places/ratings/:
    get:
      operationId: places_ratings_list
      description: A user's own ratings (for management UI).
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - places
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlaceRatingList'
          description: ''
    post:
      operationId: places_ratings_create
      description: A user's own ratings (for management UI).
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceRating'
          description: ''
  /api/places/ratings/{id}/:
    get:
      operationId: places_ratings_retrieve
      description: A user's own ratings (for management UI).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Place Rating.
        required: true
      tags:
      - places
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceRating'
          description: ''
    put:
      operationId: places_ratings_update
      description: A user's own ratings (for management UI).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Place Rating.
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceRating'
          description: ''
    patch:
      operationId: places_ratings_partial_update
      description: A user's own ratings (for management UI).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Place Rating.
        required: true
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPlaceRatingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPlaceRatingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPlaceRatingRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceRating'
          description: ''
    delete:
      operationId: places_ratings_destroy
      description: A user's own ratings (for management UI).
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Place Rating.
        required: true
      tags:
      - places
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/places/ratings/rate-place/:
    post:
      operationId: places_ratings_rate_place_create
      description: A user's own ratings (for management UI).
      tags:
      - places
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlaceRatingRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceRating'
          description: ''
  /api/places/submit-place/:
    post:
      operationId: places_submit_place_create
      description: Authenticated users submit a new place; always created on moderation.
      tags:
      - places
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlaceCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlaceCreateRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceCreateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceCreate'
          description: ''
  /api/reviews/{id}/{action_name}/:
    patch:
      operationId: reviews_partial_update
      description: Admin endpoint to approve/reject a review (action_name from URL).
      parameters:
      - in: path
        name: action_name
        schema:
          type: string
          pattern: ^approve|reject$
        required: true
      - in: path
        name: id
        schema:
          type: string
          pattern: ^\d+$
        required: true
      tags:
      - reviews
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedReviewRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedReviewRequest'
