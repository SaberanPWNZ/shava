components:
  schemas:
    ArticleDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        excerpt:
          type: string
          maxLength: 400
        content:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        category:
          $ref: '#/components/schemas/Category9f0Enum'
        author:
          type: integer
          nullable: true
        author_name:
          type: string
          readOnly: true
        published_at:
          type: string
          format: date-time
        is_published:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author_name
      - content
      - created_at
      - id
      - slug
      - title
      - updated_at
    ArticleDetailRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        excerpt:
          type: string
          maxLength: 400
        content:
          type: string
          minLength: 1
        cover_image:
          type: string
          format: binary
          nullable: true
        category:
          $ref: '#/components/schemas/Category9f0Enum'
        author:
          type: integer
          nullable: true
        published_at:
          type: string
          format: date-time
        is_published:
          type: boolean
      required:
      - content
      - title
    ArticleList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        excerpt:
          type: string
          readOnly: true
        cover_image:
          type: string
          format: uri
          readOnly: true
          nullable: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category9f0Enum'
          readOnly: true
        author_name:
          type: string
          readOnly: true
        published_at:
          type: string
          format: date-time
          readOnly: true
        is_published:
          type: boolean
          readOnly: true
      required:
      - author_name
      - category
      - cover_image
      - excerpt
      - id
      - is_published
      - published_at
      - slug
      - title
    Badge:
      type: object
      properties:
        code:
          type: string
          maxLength: 64
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          maxLength: 120
