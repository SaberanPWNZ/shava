# =============================================================================
# Development stack — `docker-compose up --build`
# Reads variables from `.env.dev` (copy from `.env.dev.example`).
# Postgres is bound to 127.0.0.1 only so it is not reachable from the LAN.
# =============================================================================

services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./.env.dev
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    env_file:
      - ./.env.dev
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    # Bind to localhost only — the DB must never be reachable from the network.
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./.env.dev
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - web
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Bind to localhost only — the broker must never be reachable from
    # the network. Port is exposed for ``redis-cli`` debugging.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO is the local S3-compatible object store used when
  # ``USE_S3_STORAGE=True`` is set in ``.env.dev``. Avatar / place /
  # review uploads (and easy-thumbnails) flow through django-storages so
  # the local stack mirrors the production S3 deploy. Bound to localhost
  # only — never expose the API or console to the LAN.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - ./.env.dev
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      # 9000 — S3 API; 9001 — admin console.
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot init container: creates the upload bucket and makes it
  # publicly readable so signed URLs aren't required for image GETs.
  # Re-runs idempotently on every ``docker-compose up``.
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./.env.dev
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_STORAGE_BUCKET_NAME=${AWS_STORAGE_BUCKET_NAME:-shava-media}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing \"local/$$AWS_STORAGE_BUCKET_NAME\" &&
      mc anonymous set download \"local/$$AWS_STORAGE_BUCKET_NAME\" || true
      "
    restart: "no"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    command: celery -A config worker -l INFO
    env_file:
      - ./.env.dev
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    command: celery -A config beat -l INFO
    env_file:
      - ./.env.dev
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:
  minio_data:
